<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Div & Span</title>
    <style>
      /* div{
        display: inline;
    }
    */
    </style>
  </head>
  <body>
    <!-- div: layout card -->
    <div class="card">
      <div class="card-header"><h3>Web3 Guide</h3></div>
      <div class="card-body"><p>Learn about DeFi and NFTs.</p></div>
    </div>
    <div>hello</div>
    <div>whats up</div>

    <!-- span: inline styling -->
    <p>
      Price is <span style="color: green; font-weight: bold">$49</span> today
      only.
    </p>

    <!-- span: JS target -->
    <p>You have <span id="count">0</span> notifications.</p>
  </body>
</html>
