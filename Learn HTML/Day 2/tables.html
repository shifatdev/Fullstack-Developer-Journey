<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tables in HTML</title>
</head>
<body>
    <table border="2px" align="center">
  <caption>Course Pricing Plans</caption>

  <thead>
    <tr>
      <th scope="col">Plan</th>
      <th scope="col">Price</th>
      <th scope="col">Features</th>
    </tr>
  </thead>

  <tbody>
    <tr>
      <td>Free</td>
      <td>$0</td>
      <td>5 courses</td>
    </tr>
    <tr>
      <td>Pro</td>
      <td>$29/mo</td>
      <td colspan="1">Unlimited courses</td>
    </tr>
  </tbody>

  <tfoot>
    <tr>
      <td colspan="3">All plans include 7-day money back</td>
    </tr>
  </tfoot>

</table>
</body>
</html>
