<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>List usage</title>
</head>
<body>
    <!-- Unordered list -->
<ul>
  <li>HTML</li>
  <li>CSS</li>
  <li>JavaScript</li>
</ul>

<!-- Ordered list (steps) -->
<ol>
  <li>Create HTML file</li>
  <li>Write structure</li>
  <li>Open in browser</li>
</ol>

<!-- Nested list -->
<ul>
  <li>Frontend
    <ul>
      <li>HTML</li>
      <li>CSS</li>
      <li>JavaScript</li>
    </ul>
  </li>
  <li>Backend
    <ul>
      <li>Node.js</li>
      <li>Python</li>
    </ul>
  </li>
</ul>

<!-- Description list (glossary) -->
<dl>
  <dt>HTML</dt>
  <dd>HyperText Markup Language — structures web pages</dd>
  <dt>CSS</dt>
  <dd>Cascading Style Sheets — styles web pages</dd>
</dl>
</body>
</html>
